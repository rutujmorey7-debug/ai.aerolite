name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy-bot@example.com"
          git config --global user.name "Deploy Bot"
          # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME below with your details
          git push --force https://rutujmorey7debug:$HF_TOKEN@huggingface.co/spaces/rutujmorey7-debug/ai-aerolite main
          
