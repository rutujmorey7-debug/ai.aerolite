<!DOCTYPE html>
<html>

<head>
    <title>AeroLite AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

    <div class="sidebar">

        <div class="logo">🧠 AeroLite AI</div>

        <button onclick="newChat()">+ New Chat</button>

        <div class="modes">
            <button onclick="setMode('basic')">Basic</button>
            <button onclick="setMode('thinking')">Thinking</button>
            <button onclick="setMode('code')">Code</button>
        </div>

        <div id="chatHistory"></div>

    </div>

    <div class="main">

        <div id="chatbox" class="chatbox"></div>

        <div class="input-area">
            <input id="message" placeholder="Message AeroLite AI...">
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
